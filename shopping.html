<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <!-- Page styling -->
    <style>

        * {
            outline: 0;
            border: 0;
        }

        body {
            font-size: 0.9rem;
        }

        a {
            color: #000;
            text-decoration: none;
        }

        .btn {
            color: #f1f1f1;
            background: #1e1e1e;
            padding: 1rem 1.2rem;
        }

        .cart-btn {
            position: absolute;
        }

        .cart {
            background: #f1f1f1;
            height: 100%;
            position: fixed;
            right: 0;
            padding: 1rem 1rem;
            top: 0;
            width: 30%;
            display: none;
            box-shadow: -2px 0 16px rgb(0, 0, 0, .8);
        }

        .show {
            display: flex;
            gap: 1rem;
            flex-direction: column;
        }

        img {
            width: 100%;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: .4rem;
            padding-top: 4rem;
        }
        
        .pcard {
            background: white;
            height: auto;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            display: flex;
            flex-direction: column;
            border: 1px solid black;
            padding: 1rem 0.3rem;
        }

        .cart.show .clear_cart_btn {
            align-self: flex-end;
        }
    </style>
</head>
<body>

    <a class="btn cart-btn">Cart</a>


    <div class="cart">

        <a class="clear_cart_btn">Clear all</a>

        <div class="inner_cart"></div>

    </div>

    <div class="products"></div>
    
</body>
<!-- Javasvript code -->
<script>

    const products = [
        { id: 1, img: './images/img2.png', name: 'Laptop', price: 1200 },
        { id: 2, img: './images/image.png', name: 'Phone', price: 800 },
        { id: 3, img: './images/img3.png', name: 'Food', price: 11 },
        { id: 4, img: './images/img1.png', name: 'Tablet', price:750 },
        { id: 5, img: './images/img4.png', name: 'Book', price: 35 }
    ]

    const cart_arr = []

    const cart_btn = document.querySelector('.btn.cart-btn')
    const cart = document.querySelector('.cart .inner_cart')
    const cartO = document.querySelector('.cart')
    const productContainer = document.querySelector('.products')
    const clear_cart_btn = document.querySelector('.clear_cart_btn')

    products.forEach(product => {
        const card = document.createElement('div')
        card.className = 'pcard'
        card.textContent = 'Product'

        card.innerHTML = `
            <h1>${product.name}</h1>
            <p>$ ${product.price}</p>
            <img src='${product.img}'>
            <button class="btn add-btn" data-id="${product.id}">Add to Cart</button>
        `
        productContainer.appendChild(card)
    })

    function loadCart() {
        cart.innerHTML = ''
    
        cart_arr.forEach(item => {
            const cartItem = document.createElement('div')
            cartItem.className = 'cart-item'
            cartItem.textContent = 'Cart Product'
            cartItem.innerHTML = `
                <p>${item.name}</p>
                <p>$ ${item.price}</p>
                <button class="btn rem-btn" data-id="${item.id}">Remove from Cart</button>
            `
            cart.appendChild(cartItem)
        })
    }

    productContainer.addEventListener('click', (e) => {
        if(e.target.classList.contains('add-btn')) {
            const id = Number(e.target.dataset.id)
            const product = products.find(item => item.id === id)

            cart_arr.push(product)
            loadCart()
        }
    })

    cart.addEventListener('click', (e) => {
        if(e.target.classList.contains('rem-btn')) {
            const id = Number(e.target.dataset.id)
            const index = cart_arr.find(item => item.id === id)

            if(index !== -1) {
                cart_arr.splice(index, 1)
                loadCart()
            }

            cart_arr.push(product)
            loadCart()
        }
    })

    clear_cart_btn.addEventListener('click', () => {
        cart_arr.length = 0
        loadCart()
    })

    cart_btn.addEventListener('click', () => {
        cartO.classList.toggle('show')
    })

</script>
</html>
