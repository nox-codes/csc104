<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            margin: 0;
            padding: 0;
        }
        .question_interface {
            min-height: 100vh;
            align-items: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 2rem;
        }

        .options button {
            padding: 2rem 8rem;
            border: 1px solid black;
            border-radius: .6rem;
            outline: none;
        }

        button {
            transition: all 500ms;
            padding: .8rem 2rem;
            border: 1px solid black;
            border-radius: .6rem;
            outline: none;
        }
    </style>
</head>
<body>
    
    <div class="question_interface">

    </div>

</body>

<script>

const questions = [
  {
    "question": "Which planet is known as the Red Planet?",
    "options": ["Earth", "Mars", "Venus", "Jupiter"],
    "answer": "Mars"
  },
  {
    "question": "What is the capital of Japan?",
    "options": ["Seoul", "Tokyo", "Beijing", "Bangkok"],
    "answer": "Tokyo"
  },
  {
    "question": "How many sides does a hexagon have?",
    "options": ["5", "6", "7", "8"],
    "answer": "6"
  },
  {
    "question": "Which language runs in the browser?",
    "options": ["Python", "Java", "JavaScript", "C++"],
    "answer": "JavaScript"
  },
  {
    "question": "What is the boiling point of water at sea level?",
    "options": ["90°C", "100°C", "80°C", "120°C"],
    "answer": "100°C"
    },
    {
        "question": "What gas do plants absorb from the atmosphere?",
        "options": ["Oxygen", "Nitrogen", "Carbon Dioxide", "Hydrogen"],
        "answer": "Carbon Dioxide"
    },
    {
        "question": "Which ocean is the largest?",
        "options": ["Atlantic Ocean", "Indian Ocean", "Pacific Ocean", "Arctic Ocean"],
        "answer": "Pacific Ocean"
    },
    {
        "question": "How many continents are there on Earth?",
        "options": ["5", "6", "7", "8"],
        "answer": "7"
    },
    {
        "question": "What is the chemical symbol for gold?",
        "options": ["Ag", "Au", "Gd", "Go"],
        "answer": "Au"
    },
    {
        "question": "Which device is used to measure temperature?",
        "options": ["Barometer", "Thermometer", "Hygrometer", "Altimeter"],
        "answer": "Thermometer"
  }
]

const qui = document.querySelector('.question_interface')

let currentIndex = 0
let score = 0

function renderQuestion() {
    if(currentIndex >= questions.length) {
        let remark = ''

        if(score === questions.length) {
            remark = 'Perfect.'
        }
        else if(score >= questions.length / 2) {
            remark = 'You tried.'
        }
        else {
            remark = 'You failed.'
        }

        qui.innerHTML = `
            <h1>Quiz Finished</h1>
            <p>Your score: ${score} / ${questions.length}</p>
            <p>${remark}</p>
            <button onclick="location.reload()">Try Again</button>
        `

        return
    }

    const currentQuestion = questions[currentIndex]

    qui.innerHTML = `
        <h1>${currentQuestion.question}</h1>
        <div class="options"></div>
    `

    const optionBox = document.querySelector('.options')

    currentQuestion.options.forEach(option => {
        const button = document.createElement('button')
        button.textContent = option

        button.addEventListener('click', () => {
            if(option === currentQuestion.answer) {
                // document.body.style.background = '#6BF178'
                button.style.background = '#6BF178'
                button.style.border = 'none'
                score++
            }   else {
                // document.body.style.background = '#FF5964'
                button.style.background = '#FF5964'
                button.style.border = 'none'
            }

            setTimeout(() => {
                document.body.style.background = ''
                currentIndex++
                renderQuestion()
            }, 1024)
        })

        optionBox.appendChild(button)
    })
}

renderQuestion()
</script>

</html>
