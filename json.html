<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
    <div id="results"></div>

</body>

<script>
let schoolData = `{
    "classA": [
        {"name": "Amara", "CSC101": 72, "CSC102": 55, "CSC103": 68},
        {"name": "Chidi", "CSC101": 40, "CSC102": 48, "CSC103": 35},
        {"name": "Ngozi", "CSC101": 85, "CSC102": 90, "CSC103": 78},
        {"name": "Emeka", "CSC101": 60, "CSC102": 52, "CSC103": 44}
    ],
    "classB": [
        {"name": "Fatima", "CSC101": 91, "CSC102": 88, "CSC103": 95},
        {"name": "Tunde", "CSC101": 30, "CSC102": 45, "CSC103": 50},
        {"name": "Blessing", "CSC101": 77, "CSC102": 63, "CSC103": 70},
        {"name": "Seun", "CSC101": 55, "CSC102": 49, "CSC103": 58}
    ]
}`;

const data = JSON.parse(schoolData)

const results = []

for(const students of Object.values(data)) {
    for(const student of students) {
        let scores = [student.CSC101, student.CSC102, student.CSC103]
        const average = (student.CSC101 + student.CSC102 + student.CSC103) / scores.length 
        const status = average >= 50 ? "Pass" : "Fail"

        results.push({
            name: student.name,
            average: average.toFixed(1),
            status
        })
    }
}

function render() {
    const rows = results.map(student => `
        <tr>
            <td>${student.name}</td>    
            <td>${student.average}</td>    
            <td>${student.status}</td>    
        </tr>
    `).join("")

    document.getElementById("results").innerHTML = `
            <table border="1">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Average</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    ${rows}
                </tbody>
            </table>
    `
}

render()

</script>

</html>
